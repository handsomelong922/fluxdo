name: Build and Release

on:
  push:
    tags:
      - 'v*'

# CUSTOM: Keyword Filter 顶层写权限，供 Release 创建/附件上传使用
permissions:
  contents: write

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # CUSTOM: Keyword Filter 精简构建矩阵 - 仅保留 Android arm64-v8a 与 Windows x86_64
          - platform: android
            os: ubuntu-latest
            arch: arm64-v8a
            rust-target: aarch64-linux-android
            flutter-target: android-arm64
          - platform: windows
            os: windows-2022
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        if: startsWith(matrix.platform, 'android')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true

      - name: Setup Rust
        if: startsWith(matrix.platform, 'android') || matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android build environment
        if: startsWith(matrix.platform, 'android')
        run: |
          rustup target add ${{ matrix.rust-target }}
          cargo install cargo-ndk
          sudo apt-get update && sudo apt-get install -y cmake

      - name: Setup Android NDK
        if: startsWith(matrix.platform, 'android')
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: Configure Keystore
        if: startsWith(matrix.platform, 'android')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/key.jks
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=../app/key.jks" >> android/key.properties

      - name: Inject dummy google-services.json
        if: startsWith(matrix.platform, 'android')
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.github.lingyan000.fluxdo"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}' > android/app/google-services.json

      - name: Build Android
        if: startsWith(matrix.platform, 'android')
        run: |
          dart tool/flutterw.dart build apk --release --target-platform ${{ matrix.flutter-target }} --dart-define=cronetHttpNoPlay=true
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep "lib/${{ matrix.arch }}/libdoh_proxy.so"
          cmp -s core/doh_proxy/certs/ca.der android/app/src/main/res/raw/proxy_ca.der
          cmp -s core/doh_proxy/certs/ca.crt assets/certs/proxy_ca.pem
          mkdir -p dist
          mv build/app/outputs/flutter-apk/app-release.apk dist/fluxdo-${{ matrix.arch }}.apk

      - name: Setup NuGet
        if: matrix.platform == 'windows'
        uses: nuget/setup-nuget@v2

      - name: Setup NASM
        if: matrix.platform == 'windows'
        uses: ilammy/setup-nasm@v1

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: |
          dart tool/flutterw.dart build windows --release
          $releaseDir = "build\\windows\\x64\\runner\\Release"
          if (-not (Test-Path "$releaseDir\\native\\doh_proxy.dll")) { throw "Missing doh_proxy.dll" }
          if (-not (Test-Path "$releaseDir\\native\\doh_proxy_bin.exe")) { throw "Missing doh_proxy_bin.exe" }
          mkdir dist

      - name: Package Windows ZIP
        if: matrix.platform == 'windows'
        run: |
          cd build\windows\x64\runner\Release
          7z a -tzip "..\..\..\..\..\dist\fluxdo-windows-x86_64.zip" .

      - name: Build Windows Installer (exe)
        if: matrix.platform == 'windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version windows\setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  changelog:
    needs:
      - build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/heads/main
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        run: |
          temp="NEW_CHANGELOG.md"
          cat <<'EOF' > "$temp"
          ## ${{ github.ref_name }}

          - 同步上游 (Linux.do) 最新特性与性能优化

          EOF

          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"
          mv "$temp" CHANGELOG.md

      - name: Commit Changelog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "Update changelog for ${{ github.ref_name }}"
            git push
          fi

  upload:
    needs:
      - build
    runs-on: ubuntu-latest
    permissions: write-all
    services:
      telegram-bot-api:
        image: aiogram/telegram-bot-api:latest
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        ports:
          - 8081:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la ./dist/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Write release notes
        run: |
          cat <<'EOF' > release_notes.md
          ## 🚀 本次更新
          - 同步上游 (Linux.do) 最新特性与性能优化

          ## ✨ FluxDO 增强版专属功能
          1. 🛡️ **高级内容过滤**：支持标题正则关键词、特定标签（Tag）、特定用户屏蔽，彻底净化时间线。
          2. 🤖 **AI 能力增强**：支持自定义 4 类 AI 提示词（总结与回复），AI 流式输出时静止页面不跳动。
          3. ⚡ **极致精简**：移除冗余追踪，专属优化 Android/Windows 打包。
          EOF

      - name: Wait for telegram-bot-api
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        if: env.TELEGRAM_BOT_TOKEN
        run: |
          for i in {1..20}; do
            if curl -sf "http://localhost:8081/bot${TELEGRAM_BOT_TOKEN}/getMe" > /dev/null; then
              echo "telegram-bot-api is ready"
              exit 0
            fi
            echo "waiting for telegram-bot-api..."
            sleep 2
          done
          echo "telegram-bot-api not ready"
          exit 1

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          IS_PRERELEASE: ${{ contains(github.ref, '-') }}
          TELEGRAM_API_BASE: http://localhost:8081
        if: env.TELEGRAM_BOT_TOKEN
        run: |
          python -m pip install --upgrade pip
          pip install requests
          python release_telegram.py

      - name: Generate SHA256 checksums
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create Release
        if: env.IS_STABLE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # CUSTOM: Keyword Filter 显式列出产物路径，确保 Release 必附带 APK / ZIP / 安装包
          files: |
            ./dist/fluxdo-arm64-v8a.apk
            ./dist/fluxdo-arm64-v8a.apk.sha256
            ./dist/fluxdo-windows-x86_64.zip
            ./dist/fluxdo-windows-x86_64.zip.sha256
            ./dist/fluxdo-windows-x86_64-setup.exe
            ./dist/fluxdo-windows-x86_64-setup.exe.sha256
          fail_on_unmatched_files: true
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
